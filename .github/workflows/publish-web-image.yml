name: Publish Web Image

# Build the Sunstone Web image and push it multi-arch to Docker Hub.
#
# Runs on the same v* tags as the desktop release flow (release.yml), and can be
# triggered manually via workflow_dispatch (optionally overriding the tag). This
# is a standalone job — it does NOT wait on the Tauri installer build.
#
# Requires two repo-level GitHub config values (set by the maintainer — see
# docker/README.md → "Publishing to Docker Hub"):
#   - variable DOCKERHUB_USERNAME : the Docker Hub namespace to push under.
#   - secret   DOCKERHUB_TOKEN    : a Docker Hub access token with push rights.
# The image name is derived from the variable, so no namespace is hardcoded.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. 0.14.0). Defaults to latest."
        required: false
        default: "latest"

jobs:
  publish-web-image:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          IMAGE="${{ vars.DOCKERHUB_USERNAME }}/sunstone-web"
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push (v1.2.3) → publish :1.2.3 and :latest.
            VERSION="${GITHUB_REF_NAME#v}"
            TAGS="${IMAGE}:${VERSION},${IMAGE}:latest"
          else
            # Manual run → publish the requested tag (default latest).
            TAG="${{ github.event.inputs.tag }}"
            TAGS="${IMAGE}:${TAG:-latest}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
