{{ template "header.html" . }}

<div class="theme-panel">
  <h2 class="theme-heading">Log in to Your Account</h2>

  <!-- DEV quick-login buttons (docker-compose.dex.yml). Each mini-form POSTs a
       seeded test user's credentials to the SAME PostURL endpoint as the manual
       form below, so a single click completes the OIDC login with no typing. The
       plaintext passwords here are the committed dev fixtures from config.yaml —
       NOT secrets. Keep this list in sync with `staticPasswords` in
       docker/dex/config.yaml. -->
  <div class="dex-quick-login">
    <form method="post" action="{{ .PostURL }}">
      <input type="hidden" name="login" value="alice@sunstone.test" />
      <input type="hidden" name="password" value="alice-password" />
      <button type="submit" class="dex-btn theme-btn-provider">
        <span class="dex-btn-text">Log in as Alice Example</span>
      </button>
    </form>
    <form method="post" action="{{ .PostURL }}">
      <input type="hidden" name="login" value="bob@sunstone.test" />
      <input type="hidden" name="password" value="bob-password" />
      <button type="submit" class="dex-btn theme-btn-provider">
        <span class="dex-btn-text">Log in as Bob Example</span>
      </button>
    </form>
  </div>

  <div class="dex-quick-login-divider"><span>or sign in manually</span></div>

  <form method="post" action="{{ .PostURL }}">
    <div class="theme-form-row">
      <div class="theme-form-label">
        <label for="userid">{{ .UsernamePrompt }}</label>
      </div>
	  <input tabindex="1" required id="login" name="login" type="text" class="theme-form-input" placeholder="{{ .UsernamePrompt | lower }}" {{ if .Username }} value="{{ .Username }}" {{ else }} autofocus {{ end }}/>
    </div>
    <div class="theme-form-row">
      <div class="theme-form-label">
        <label for="password">Password</label>
      </div>
	  <input tabindex="2" required id="password" name="password" type="password" class="theme-form-input" placeholder="password" {{ if .Invalid }} autofocus {{ end }}/>
    </div>

    {{ if .Invalid }}
      <div id="login-error" class="dex-error-box">
        Invalid {{ .UsernamePrompt }} and password.
      </div>
    {{ end }}

    <button tabindex="3" id="submit-login" type="submit" class="dex-btn theme-btn--primary">Login</button>

  </form>
  {{ if .BackLink }}
  <div class="theme-link-back">
    <a class="dex-subtle-text" href="{{ .BackLink }}">Select another login method.</a>
  </div>
  {{ end }}
</div>

<style type="text/css">
  /* Dev quick-login affordances: stacked full-width buttons, then a labelled
     divider before the manual username/password form. */
  .dex-quick-login form { margin: 0 0 0.5rem; }
  .dex-quick-login .theme-btn-provider { width: 100%; }
  .dex-quick-login-divider {
    display: flex;
    align-items: center;
    text-align: center;
    margin: 1rem 0;
    color: #8b95a1;
    font-size: 0.8rem;
  }
  .dex-quick-login-divider::before,
  .dex-quick-login-divider::after {
    content: "";
    flex: 1;
    border-bottom: 1px solid #d0d5dd;
  }
  .dex-quick-login-divider span { padding: 0 0.6rem; }
</style>

<script type="text/javascript">
  // Disable the MANUAL submit button once its form is submitted (default Dex
  // behaviour). Target it by id so the quick-login mini-forms above don't change
  // which form this binds to.
  document.getElementById('submit-login').closest('form').onsubmit = function(e) {
    document.getElementById('submit-login').setAttribute('disabled', 'disabled');
  };
</script>

{{ template "footer.html" . }}
