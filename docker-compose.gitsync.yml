# Sunstone Web + git-sync sidecar — EXAMPLE topology.
#
# A git-sync sidecar polls a remote git repo into a shared named volume; the
# sunstone-web container mounts that volume READ-ONLY and serves it. Content
# fetching lives entirely outside the Sunstone image (Sunstone is unchanged —
# folder-mount only).
#
#   docker compose -f docker-compose.gitsync.yml up -d
#
# Configure via env (defaults shown):
#   SUNSTONE_GIT_REPO    git URL to sync            (required, e.g. https://github.com/you/wiki)
#   SUNSTONE_GIT_REF     branch / tag / commit      (default: main)
#   SUNSTONE_GIT_PERIOD  poll interval              (default: 30s)
#   SUNSTONE_WEB_PORT    host port for the viewer   (default: 3000)
#
# ⚠️ LIVE-RELOAD CAVEAT — READ docker/README.md.
# git-sync (v4) updates atomically by writing each commit into a NEW worktree
# directory (`/content/.worktrees/<sha>`) and repointing the `/content/bundle`
# SYMLINK to it, then garbage-collecting the old worktree. Sunstone canonicalises
# SUNSTONE_BUNDLE at startup and its inotify watcher pins to that one worktree
# inode. When git-sync swaps the symlink the watcher does NOT see the new tree —
# and once the old worktree is GC'd the server serves 404s until restarted.
#
# So with git-sync you must restart the viewer to pick up new content:
#   docker compose -f docker-compose.gitsync.yml restart sunstone-web
# There is NO live push to connected browsers. If you want live reload, use the
# post-receive-hook or checkout-sidecar approach instead (docker/README.md).
#
# ⚠️ NO AUTH — internal networks only. See docs/deploy-web.md.

services:
  git-sync:
    image: registry.k8s.io/git-sync/git-sync:v4.4.2
    restart: unless-stopped
    # A fresh named volume is root-owned; git-sync's default uid (65533) cannot
    # write it. Run as root so it can initialise /content. (git-sync only writes
    # the shared volume; Sunstone mounts it :ro.)
    user: "0:0"
    command:
      - --repo=${SUNSTONE_GIT_REPO:?set SUNSTONE_GIT_REPO to the wiki git URL}
      - --ref=${SUNSTONE_GIT_REF:-main}
      - --root=/content
      - --link=bundle
      - --period=${SUNSTONE_GIT_PERIOD:-30s}
    volumes:
      - content:/content

  sunstone-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: sunstone-web:latest
    init: true
    restart: unless-stopped
    depends_on:
      git-sync:
        condition: service_started
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      SUNSTONE_API_PORT: 8787
      SUNSTONE_API_INTERNAL: http://localhost:8787
      # The git-sync symlink to the current worktree. Canonicalised once at
      # startup — see the LIVE-RELOAD CAVEAT above.
      SUNSTONE_BUNDLE: /content/bundle
    volumes:
      # git-sync writes this volume; Sunstone only reads it.
      - content:/content:ro
    ports:
      - "${SUNSTONE_WEB_PORT:-3000}:3000"

volumes:
  content:
