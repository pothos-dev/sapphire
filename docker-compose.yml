# Sunstone Web — internal deployment.
#
# One container serves the SSR web viewer AND the read-only Rust API over a
# Bundle mounted read-only from the host. See docs/deploy-web.md.
#
#   SUNSTONE_BUNDLE_HOST  host path of the Bundle to serve (default ./examples)
#   SUNSTONE_WEB_PORT     host port to publish the web viewer on (default 3000)
#
# Example:
#   SUNSTONE_BUNDLE_HOST=/srv/okf/my-bundle SUNSTONE_WEB_PORT=8080 docker compose up --build
#
# SECURITY: there is NO authentication. Publish this only on a trusted internal
# network / behind a private reverse proxy. Do not expose it to the public
# internet until an auth phase lands.

services:
  sunstone-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: sunstone-web:latest
    # Reap zombies + forward signals cleanly to the entrypoint (PID 1).
    init: true
    restart: unless-stopped
    environment:
      # Public SSR web server (adapter-node reads HOST/PORT).
      HOST: 0.0.0.0
      PORT: 3000
      # Read-only Rust API (internal to the container).
      SUNSTONE_API_PORT: 8787
      SUNSTONE_API_INTERNAL: http://localhost:8787
      # The Bundle root inside the container == the mount target below.
      SUNSTONE_BUNDLE: /bundle
    volumes:
      # Bundle mounted READ-ONLY (:ro): the container reads it, never writes it.
      - type: bind
        source: ${SUNSTONE_BUNDLE_HOST:-./examples}
        target: /bundle
        read_only: true
    ports:
      # host:container — publish only on the internal network.
      - "${SUNSTONE_WEB_PORT:-3000}:3000"
