# Sunstone Web + git-checkout sidecar — RECOMMENDED for LIVE RELOAD.
#
# A tiny sidecar keeps a mirror repo in a PRIVATE volume and checks the working
# tree out IN PLACE into a shared volume, with the git metadata kept OUT of the
# served tree (--git-dir points at the private volume, --work-tree at the shared
# one). Because the served path is stable and files are rewritten in place,
# Sunstone's inotify watcher fires and /api/events pushes the change to every
# connected browser — no restart, no manual refresh. Verified: see docker/README.md.
#
# Content fetching lives entirely outside the Sunstone image (Sunstone is
# unchanged — folder-mount only).
#
#   docker compose -f docker-compose.git-checkout.yml up -d
#
# Configure via env (defaults shown):
#   SUNSTONE_GIT_REPO    git URL to sync            (required)
#   SUNSTONE_GIT_REF     branch / tag / commit      (default: main)
#   SUNSTONE_GIT_PERIOD  poll interval, seconds     (default: 30)
#   SUNSTONE_WEB_PORT    host port for the viewer   (default: 3000)
#
# For push-instant (no polling) updates instead, push to a bare repo with the
# post-receive hook (docker/post-receive.example) — same clean checkout, same
# live reload. See docker/README.md.
#
# ⚠️ NO AUTH — internal networks only. See docs/deploy-web.md.

services:
  git-checkout:
    image: alpine/git:latest
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      # NB: $$ escapes compose interpolation so the container shell expands these
      # at runtime (from the environment: block below), not compose at parse time.
      - |
        set -eu
        git config --global --add safe.directory '*'
        if [ ! -d /gitdir/refs ]; then
          echo "git-checkout: mirroring $$SUNSTONE_GIT_REPO into /gitdir"
          git clone --mirror "$$SUNSTONE_GIT_REPO" /gitdir
        fi
        mkdir -p /content
        while true; do
          git --git-dir=/gitdir fetch -q --prune origin '+refs/heads/*:refs/heads/*' '+refs/tags/*:refs/tags/*' || true
          # checkout -f rewrites only changed files under /content in place; the
          # .git metadata stays in /gitdir, so the watched tree has no git noise.
          git --git-dir=/gitdir --work-tree=/content checkout -f "$$SUNSTONE_GIT_REF" -- . || true
          sleep "$$SUNSTONE_GIT_PERIOD"
        done
    environment:
      SUNSTONE_GIT_REPO: ${SUNSTONE_GIT_REPO:?set SUNSTONE_GIT_REPO to the wiki git URL}
      SUNSTONE_GIT_REF: ${SUNSTONE_GIT_REF:-main}
      SUNSTONE_GIT_PERIOD: ${SUNSTONE_GIT_PERIOD:-30}
    volumes:
      - gitdir:/gitdir      # private: git metadata, NOT served
      - content:/content    # shared: the working tree Sunstone reads

  sunstone-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: sunstone-web:latest
    init: true
    restart: unless-stopped
    depends_on:
      git-checkout:
        condition: service_started
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      SUNSTONE_API_PORT: 8787
      SUNSTONE_API_INTERNAL: http://localhost:8787
      # A stable directory (no symlink swap) — the watcher stays attached.
      SUNSTONE_BUNDLE: /content
    volumes:
      - content:/content:ro
    ports:
      - "${SUNSTONE_WEB_PORT:-3000}:3000"

volumes:
  gitdir:
  content:
